services:
  postgres:
    image: postgres:16-alpine
    container_name: yammer-postgres
    environment:
      POSTGRES_DB: yammer
      POSTGRES_USER: yammer
      POSTGRES_PASSWORD: yammerpass
    ports:
      - "5432:5432"
    volumes:
      - yammer-postgres-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yammer -d yammer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  yammer-postgres-data:
