spring:
  application:
    name: yammer
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/yammer?currentSchema=yammer}
    username: ${DATABASE_USERNAME:yammer}
    password: ${DATABASE_PASSWORD:yammerpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    # No lazy JPA associations (FKs are plain UUID columns), so holding a DB
    # connection for the whole request buys nothing — free it after the service layer.
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: yammer
        # Batch multi-row saveAll / per-line writes into fewer round-trips.
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: yammer
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

# JWT signing config. Secret must be >= 32 bytes for HS256.
# Override JWT_SECRET in any real environment.
jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-32-bytes-minimum!!}
  # Token time-to-live in milliseconds (default 24h).
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# On-prem bridge (fiscal cash registers + thermal printers) WebSocket auth.
# Must match the bridge's BRIDGE_API_KEY. Blank = accept any handshake (dev only).
bridge:
  api-key: ${BRIDGE_API_KEY:}

# Customer web app base URL — used to build the QR-code landing links (events → Export QR).
# Override per environment (prod: set APP_CUSTOMER_BASE_URL=https://servioapp.ro).
# The `local` dev profile overrides this with the dev machine's LAN IP.
app:
  customer-base-url: ${APP_CUSTOMER_BASE_URL:http://localhost:4200}

# Google Cloud Storage for media (client logos, future menu-item images).
# endpoint blank -> real GCS via Application Default Credentials (GCP/Cloud Run).
# For local dev use the `local` profile, which points at the fake-gcs-server emulator.
gcs:
  bucket: ${GCS_BUCKET:yammer-media}
  project-id: ${GCS_PROJECT_ID:yammer}
  endpoint: ${GCS_ENDPOINT:}

# Netopia online card payments (customer self-service QR flow for pay-now order points).
# Disabled by default; supply real credentials + enable per environment. Never commit live keys.
# notify-url must be a PUBLICLY reachable URL of this app's /public/payments/netopia/notify
# (use an ngrok/tunnel in dev). The browser redirect URL is sent per-request by the client.
netopia:
  enabled: ${NETOPIA_ENABLED:false}
  api-key: ${NETOPIA_API_KEY:}
  pos-signature: ${NETOPIA_POS_SIGNATURE:}
  base-url: ${NETOPIA_BASE_URL:https://secure.sandbox.netopia-payments.com}
  notify-url: ${NETOPIA_NOTIFY_URL:}
  language: ${NETOPIA_LANGUAGE:ro}
  currency: ${NETOPIA_CURRENCY:RON}

# Actuator endpoints. Only health/info are exposed (metrics is internal-only); health detail
# is shown only to authenticated callers so anonymous probes get a bare UP/DOWN.
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
