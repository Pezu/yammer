# Local development profile.
# Activate with: --spring.profiles.active=local  (or set it in the IntelliJ run config).
#
# Values are hard-coded here for local convenience — no environment variables required.
# Do NOT use these values anywhere but local development.

# Object storage → fake-gcs-server emulator from docker-compose (no real GCP credentials needed).
gcs:
  bucket: yammer-media
  project-id: yammer-local
  endpoint: http://localhost:4443

# A local-only JWT signing secret (>= 32 bytes). The base config has no usable default on
# purpose — JwtService refuses to start on the committed placeholder outside a dev profile —
# so local runs need a real secret here.
jwt:
  secret: local-dev-only-jwt-secret-change-me-please-0123456789

# On-prem bridge shared secret. Blank is accepted under the local/dev profile, so the bridge
# and the manual /print endpoints work locally without a key.
bridge:
  api-key: ""

# Customer web app base — the URL the order-point QR codes (events → Export QR) point at.
# Uses the dev machine's LAN IP (not localhost) so the QR is scannable from a phone.
app:
  customer-base-url: http://192.168.1.135:4200

# Web Push VAPID keys for local testing (dev-only pair; generate your own per environment).
webpush:
  public-key: BDqLvLDQLBd9Jh1YI0bVGzMLi0mZ_Kbgc_gJMYeX9v_Nq8jkO-rCq65BxhqowZ_rsXupcepWwE4CMIeSoLLuSoM
  private-key: 0XqZcFgQDZTfkgaQRUClbw3_V1Dkkw8AbPwg-Pt2gsg

# Netopia online payments (SANDBOX) for local testing. The notify-url is an ngrok tunnel to the
# local API (port 8080), so Netopia's server-to-server IPN can reach localhost. Start the tunnel:
#   docker run -d --name yammer-ngrok --add-host=host.docker.internal:host-gateway \
#     -e NGROK_AUTHTOKEN=<token> ngrok/ngrok:latest \
#     http --url=overprominently-hemodynamic-veronica.ngrok-free.dev host.docker.internal:8080
netopia:
  enabled: true
  api-key: GMaWOObfdYQBlUWcuZFVnEqw-5DOTm6s7iOz5FFbdh0TYH23CJPEeKFx284g
  pos-signature: 37ZT-B3X1-VZOC-GOIK-2RXP
  base-url: https://secure.sandbox.netopia-payments.com
  notify-url: https://overprominently-hemodynamic-veronica.ngrok-free.dev/public/payments/netopia/notify

# Local Postgres (matches the docker-compose db).
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/yammer?currentSchema=yammer
    username: yammer
    password: yammerpass
