# ============================================================
# Local development profile.
#
# Activate it one of these ways:
#   - IntelliJ run config → "Active profiles: local"
#   - mvn spring-boot:run -Dspring-boot.run.profiles=local
#   - java -jar target/bridge-1.0-SNAPSHOT.jar --spring.profiles.active=local
#
# Only overrides the defaults in application.yml that differ for local dev.
# ============================================================

bridge:
  # Production backend. NOTE: use the Cloud Run *.run.app URL, not the custom domain —
  # Cloud Run domain mappings (api.rendezvous-app.ro) don't support WebSocket upgrades.
  server-url: wss://yammer-api-3xyvse7h5a-ew.a.run.app/ws/bridge
  # Real bridge key — must match the backend's BRIDGE_API_KEY. SECRET: do not commit.
  api-key: Ebgeqm0fOC7XG9qXHX87aiCZ2zliMuNGzah8d/kZuqs=
  reconnect-delay-seconds: 10

printer:
  tcp:
    port: 3999
  operator:
    code: 1
    pass: "0001"
  till-number: 1

logging:
  level:
    com.yammer.bridge: DEBUG
