spring:
  application:
    name: yammer-bridge

server:
  # Embedded HTTP port — only the manual /print test endpoint + health.
  port: ${BRIDGE_HTTP_PORT:8085}

# ============================================================
# Backend WebSocket connection (raw WebSocket, matches yammer's stack).
# The bridge connects OUTBOUND and authenticates with an API key passed
# as the `?key=` query parameter (mirrors how the browser passes `?token=`).
# bridge.api-key MUST match the key the backend accepts for bridge sessions.
# ============================================================
bridge:
  # Connects to the production API by default; override BRIDGE_SERVER_URL for local dev
  # (e.g. ws://localhost:8080/ws/bridge — also set in the `local` profile).
  server-url: ${BRIDGE_SERVER_URL:wss://api.rendezvous-app.ro/ws/bridge}
  api-key: ${BRIDGE_API_KEY:change-me}
  reconnect-delay-seconds: ${BRIDGE_RECONNECT_DELAY_SECONDS:10}
  print-timeout-seconds: ${BRIDGE_PRINT_TIMEOUT_SECONDS:30}

# ============================================================
# Cash register (DATECS DP-25MX) defaults. The target device IP arrives per
# request (`cashRegister` for fiscal, `printerIp` for non-fiscal); only the
# fixed TCP port + operator/till are configured here.
# VAT %% → DATECS fiscal group must match how the device is programmed.
# ============================================================
printer:
  tcp:
    port: ${PRINTER_PORT:3999}
  operator:
    code: ${PRINTER_OPERATOR_CODE:1}
    pass: ${PRINTER_OPERATOR_PASS:0001}
  till-number: ${PRINTER_TILL_NUMBER:1}
  serial-number: ${PRINTER_SERIAL_NUMBER:}

logging:
  level:
    root: INFO
    com.yammer.bridge: INFO
    org.springframework.web.socket: INFO
  file:
    name: yammer-bridge.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 3
