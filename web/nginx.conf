# WebSocket upgrade plumbing (http context via conf.d include)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + WebSocket to the api Cloud Run service. The trailing slash on
    # proxy_pass strips the "/api" prefix, matching the dev proxy's pathRewrite
    # (so /api/auth/login -> /auth/login, /api/ws/orders -> /ws/orders).
    # ^~ stops regex locations (the static-asset block) from hijacking /api paths.
    location ^~ /api/ {
        proxy_pass https://yammer-api-3xyvse7h5a-ew.a.run.app/;
        proxy_http_version 1.1;
        proxy_set_header Host yammer-api-3xyvse7h5a-ew.a.run.app;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache fingerprinted assets
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
