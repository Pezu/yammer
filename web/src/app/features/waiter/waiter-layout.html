<div class="waiter">
  <header class="topbar">
    <span class="brand">
      <app-logo [height]="38" />
    </span>
    <button type="button" class="hamburger" (click)="toggleMenu()" aria-label="Menu" [attr.aria-expanded]="menuOpen()">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </header>

  @if (menuOpen()) {
    <div class="drawer-backdrop" (click)="closeMenu()"></div>
    <nav class="drawer" role="dialog" aria-label="Menu">
      <div class="drawer-header">
        <span class="avatar">{{ initials() }}</span>
        <div class="meta">
          <div class="name">{{ username() }}</div>
          @if (roles().length) {
            <div class="sub">{{ roles().join(', ') }}</div>
          }
        </div>
        <button type="button" class="close" (click)="closeMenu()" aria-label="Close">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <ul class="drawer-menu">
        <li>
          <a routerLink="tables" routerLinkActive="active" class="drawer-link" (click)="closeMenu()">
            <span class="ic" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </span>
            <span>Tables</span>
          </a>
        </li>
        <li>
          <a routerLink="orders" routerLinkActive="active" class="drawer-link" (click)="closeMenu()">
            <span class="ic" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            </span>
            <span>Orders</span>
          </a>
        </li>
        <li>
          <a routerLink="statistics" routerLinkActive="active" class="drawer-link" (click)="closeMenu()">
            <span class="ic" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><rect x="7" y="11" width="3" height="6"></rect><rect x="12" y="7" width="3" height="10"></rect><rect x="17" y="13" width="3" height="4"></rect></svg>
            </span>
            <span>Statistics</span>
          </a>
        </li>
        <li>
          <a routerLink="payments" routerLinkActive="active" class="drawer-link" (click)="closeMenu()">
            <span class="ic" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
            </span>
            <span>Payments</span>
          </a>
        </li>
      </ul>

      <button type="button" class="drawer-logout" (click)="logout()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        <span>Logout</span>
      </button>
    </nav>
  }

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  @if (toast.message(); as msg) {
    <div class="toast" role="status">{{ msg }}</div>
  }
</div>
