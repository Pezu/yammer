<main class="auth">
  <div class="card">
    <div class="logo">
      <app-logo [height]="110" />
    </div>

    @if (error()) {
      <div class="error" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <input
          type="text"
          placeholder="Username"
          formControlName="username"
          autocomplete="username"
          [class.invalid]="submitted() && form.controls.username.invalid"
        />
        @if (submitted() && form.controls.username.invalid) {
          <small class="field-error">Username is required.</small>
        }
      </div>

      <div class="field">
        <input
          type="password"
          placeholder="Password"
          formControlName="password"
          autocomplete="current-password"
          [class.invalid]="submitted() && form.controls.password.invalid"
        />
        @if (submitted() && form.controls.password.invalid) {
          <small class="field-error">Password is required.</small>
        }
      </div>

      <button type="submit" class="btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span> Signing in…
        } @else {
          Login
        }
      </button>
    </form>
  </div>
</main>
<app-site-footer />
